<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Home Shore — buyer chat</title>
  <style>
    :root { --blue: #2563eb; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 680px; margin: 0 auto;
           padding: 0 16px; min-height: 100vh; display: flex; flex-direction: column; }

    /* Welcome view */
    #welcome { flex: 1; display: flex; flex-direction: column; justify-content: center;
               align-items: center; text-align: center; gap: 20px; padding: 24px 0; }
    #welcome h1 { font-size: 28px; font-weight: 500; margin: 0; }
    #welcome p { color: #555; margin: 0; }
    #welcome-row { display: flex; gap: 8px; width: 100%; max-width: 520px; }
    .starters { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 520px; }
    .starter { padding: 8px 14px; border: 1px solid #d0d0d0; border-radius: 20px;
               background: #fff; cursor: pointer; font-size: 14px; color: #333; }
    .starter:hover { border-color: var(--blue); color: var(--blue); }

    /* Chat view */
    #chat { display: none; flex: 1; flex-direction: column; padding: 16px 0; }
    #log { flex: 1; overflow-y: auto; padding: 8px 0; }
    .msg { margin: 8px 0; }
    .user { text-align: right; }
    .bubble { display: inline-block; padding: 9px 13px; border-radius: 14px;
              max-width: 80%; text-align: left; white-space: pre-wrap; }
    .user .bubble { background: var(--blue); color: #fff; }
    .bot  .bubble { background: #f0f0f0; color: #111; }

    /* Shared input row */
    .row { display: flex; gap: 8px; }
    .field { flex: 1; padding: 11px 14px; border: 1px solid #ccc;
             border-radius: 22px; font-size: 15px; outline: none; }
    .field:focus { border-color: var(--blue); }
    button { padding: 11px 18px; border: none; border-radius: 22px;
             background: var(--blue); color: #fff; cursor: pointer; font-size: 15px; }
    button:disabled { opacity: 0.5; cursor: default; }
    #chat .row { padding-top: 12px; border-top: 1px solid #eee; }
  </style>
</head>
<body>
  <div id="welcome">
    <div>
      <h1>Let's find your home in central Maine</h1>
      <p>Tell me a little about what you're looking for.</p>
    </div>
    <div id="welcome-row" class="row">
      <input id="welcome-input" class="field" placeholder="Type a message..." autocomplete="off">
      <button id="welcome-send">Send</button>
    </div>
    <div class="starters">
      <div class="starter">I'm just starting to look for a home</div>
      <div class="starter">What towns should I consider?</div>
      <div class="starter">Help me figure out my budget</div>
      <div class="starter">I'd like to see what's on the market</div>
    </div>
  </div>

  <div id="chat">
    <div id="log"></div>
    <div class="row">
      <input id="chat-input" class="field" placeholder="Type a message..." autocomplete="off">
      <button id="chat-send">Send</button>
    </div>
  </div>

  <script>
    const messages = [];
    const welcome = document.getElementById('welcome');
    const chat = document.getElementById('chat');
    const log = document.getElementById('log');
    const welcomeInput = document.getElementById('welcome-input');
    const chatInput = document.getElementById('chat-input');
    const chatSend = document.getElementById('chat-send');

    function addBubble(role, text) {
      const div = document.createElement('div');
      div.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
      const span = document.createElement('span');
      span.className = 'bubble';
      span.textContent = text;
      div.appendChild(span);
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    async function sendToBackend(text) {
      addBubble('user', text);
      messages.push({ role: 'user', content: text });
      chatInput.value = '';
      chatSend.disabled = true;
      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages })
        });
        const data = await res.json();
        addBubble('assistant', data.reply);
        messages.push({ role: 'assistant', content: data.reply });
      } catch (e) {
        addBubble('assistant', 'Error: ' + e.message);
      }
      chatSend.disabled = false;
      chatInput.focus();
    }

    function startConversation(text) {
      text = (text || '').trim();
      if (!text) return;
      welcome.style.display = 'none';
      chat.style.display = 'flex';
      sendToBackend(text);
    }

    // Welcome view
    document.getElementById('welcome-send')
      .addEventListener('click', () => startConversation(welcomeInput.value));
    welcomeInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') startConversation(welcomeInput.value);
    });
    document.querySelectorAll('.starter').forEach(chip => {
      chip.addEventListener('click', () => startConversation(chip.textContent));
    });

    // Chat view
    chatSend.addEventListener('click', () => sendToBackend(chatInput.value.trim()));
    chatInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && chatInput.value.trim()) sendToBackend(chatInput.value.trim());
    });
  </script>
</body>
</html>
