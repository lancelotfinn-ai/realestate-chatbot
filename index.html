<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Home Shore — buyer chat</title>
  <style>
    :root { --blue: #2563eb; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 680px; margin: 0 auto;
           padding: 0 16px; min-height: 100vh; display: flex; flex-direction: column; }

    .starters { display: flex; flex-wrap: wrap; gap: 8px; max-width: 520px; }
    .starter { padding: 8px 14px; border: 1px solid #d0d0d0; border-radius: 20px;
               background: #fff; cursor: pointer; font-size: 14px; color: #333; }
    .starter:hover { border-color: var(--blue); color: var(--blue); }

    #chat { display: flex; flex: 1; flex-direction: column; padding: 16px 0; }
    #starters { padding: 4px 0 10px; }
    #chat-header { display: flex; justify-content: flex-end; padding-bottom: 8px; }
    #download-btn { background: #fff; color: var(--blue); border: 1px solid var(--blue);
                    padding: 7px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; }
    #download-btn:disabled { opacity: 0.5; cursor: default; }
    #log { flex: 1; overflow-y: auto; padding: 8px 0; }
    .msg { margin: 8px 0; }
    .user { text-align: right; }
    .bubble { display: inline-block; padding: 9px 13px; border-radius: 14px;
              max-width: 80%; text-align: left; white-space: pre-wrap; }
    .user .bubble { background: var(--blue); color: #fff; }
    .bot  .bubble { background: #f0f0f0; color: #111; }
    .typing .bubble { color: #888; }
    .dots::after { content: '...'; animation: dots 1.2s steps(4, end) infinite;
                   display: inline-block; width: 1.2em; text-align: left; }
    @keyframes dots { 0% { content: ''; } 25% { content: '.'; }
                      50% { content: '..'; } 75% { content: '...'; } }

    .row { display: flex; gap: 8px; }
    .field { flex: 1; padding: 11px 14px; border: 1px solid #ccc;
             border-radius: 22px; font-size: 15px; outline: none; }
    .field:focus { border-color: var(--blue); }
    button.send { padding: 11px 18px; border: none; border-radius: 22px;
             background: var(--blue); color: #fff; cursor: pointer; font-size: 15px; }
    button.send:disabled { opacity: 0.5; cursor: default; }
    #chat .row { padding-top: 12px; border-top: 1px solid #eee; }
  </style>
</head>
<body>
  <div id="chat">
    <div id="chat-header">
      <button id="download-btn">Download summary (PDF)</button>
    </div>
    <div id="log"></div>
    <div id="starters" class="starters">
      <div class="starter">I'm just starting to look for a home</div>
      <div class="starter">What towns should I consider?</div>
      <div class="starter">Help me figure out my budget</div>
      <div class="starter">Can you estimate what a home is worth?</div>
    </div>
    <div class="row">
      <input id="chat-input" class="field" placeholder="Type a message..." autocomplete="off">
      <button id="chat-send" class="send">Send</button>
    </div>
  </div>

  <script>
    // The greeting is shown in the UI only — it is NOT added to `messages`,
    // because the Anthropic API requires the history to start with a user turn.
    // The system prompt tells the model an intro was already shown, so it won't
    // re-introduce itself. Edit this text freely; plain prose only (no markdown).
    const GREETING =
      "Hi, and welcome! I'm Nathan Smith's AI assistant. Nathan is a data-driven " +
      "real estate agent here in central Maine, and I'm here to help you get your " +
      "bearings on the local market — no pressure, at whatever pace suits you.\n\n" +
      "A few ways I can help: I can talk through what you're looking for — towns, " +
      "budget, timeline, the features that matter — and help you figure out what " +
      "fits. I can give you a rough, model-based estimate of what a home is worth: " +
      "just tell me a town or a full address, plus whatever details you know. And if " +
      "you've got a specific listing in mind, paste a Zillow or Redfin link and I'll " +
      "read off the key specs and tell you how the asking price stacks up.\n\n" +
      "When you're ready, I can pass your details along to Nathan so he can pick " +
      "things up himself.\n\n" +
      "So, what brings you here today — are you starting a home search, or mostly " +
      "just curious about the market?";

    const messages = [];
    const log = document.getElementById('log');
    const chatInput = document.getElementById('chat-input');
    const chatSend = document.getElementById('chat-send');
    const downloadBtn = document.getElementById('download-btn');
    const starters = document.getElementById('starters');

    function addBubble(role, text) {
      const div = document.createElement('div');
      div.className = 'msg ' + (role === 'user' ? 'user' : 'bot');
      const span = document.createElement('span');
      span.className = 'bubble';
      span.textContent = text;
      div.appendChild(span);
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
      return div;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'msg bot typing';
      div.id = 'typing';
      div.innerHTML = '<span class="bubble dots"></span>';
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }
    function hideTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    async function sendToBackend(text) {
      if (starters) starters.style.display = 'none';
      addBubble('user', text);
      messages.push({ role: 'user', content: text });
      chatInput.value = '';
      chatSend.disabled = true;
      showTyping();
      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages })
        });
        const data = await res.json();
        hideTyping();
        addBubble('assistant', data.reply);
        messages.push({ role: 'assistant', content: data.reply });
      } catch (e) {
        hideTyping();
        addBubble('assistant', 'Error: ' + e.message);
      }
      chatSend.disabled = false;
      chatInput.focus();
    }

    // Show the agent's introduction as soon as the page opens (UI only).
    addBubble('assistant', GREETING);

    document.querySelectorAll('.starter').forEach(chip => {
      chip.addEventListener('click', () => sendToBackend(chip.textContent));
    });

    chatSend.addEventListener('click', () => {
      const v = chatInput.value.trim();
      if (v) sendToBackend(v);
    });
    chatInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && chatInput.value.trim()) sendToBackend(chatInput.value.trim());
    });

    downloadBtn.addEventListener('click', async () => {
      if (messages.length === 0) return;
      downloadBtn.disabled = true;
      downloadBtn.textContent = 'Generating...';
      try {
        const res = await fetch('/export', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages })
        });
        if (!res.ok) throw new Error('export failed (' + res.status + ')');
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'home-shore-buyer-summary.pdf';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      } catch (e) {
        alert('Sorry, could not generate the PDF: ' + e.message);
      }
      downloadBtn.disabled = false;
      downloadBtn.textContent = 'Download summary (PDF)';
    });
  </script>
</body>
</html>
